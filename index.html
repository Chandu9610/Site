<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Site Inspection</title>
<style>
  :root{
    --bg:#0e0f12; --bar:#16171b; --bar2:#1d1f24; --chip:#262931;
    --line:#2c2f36; --txt:#f4f6f9; --muted:#8b9099; --accent:#0a84ff; --danger:#ff453a;
    --crit:#ff453a; --major:#ff9f0a; --minor:#ffd60a; --obs:#0a84ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font:400 16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;user-select:none;-webkit-user-select:none;}
  #app{display:flex;flex-direction:column;height:100%;padding-top:env(safe-area-inset-top);}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

  .appbar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bar);border-bottom:1px solid var(--line);}
  .brand{flex:1;min-width:0;}
  .title-row{display:flex;align-items:center;gap:8px;}
  .brand-mark{width:21px;height:21px;flex:none;}
  .brandname{font-size:19px;font-weight:700;letter-spacing:-.02em;}
  .subtitle{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .appbar-actions{display:flex;gap:8px;flex:none;}

  .btn{appearance:none;border:1px solid var(--line);background:var(--chip);color:var(--txt);border-radius:11px;
    padding:10px 16px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.ghost{background:transparent;}
  .btn.danger{color:var(--danger);border-color:transparent;background:transparent;}
  .btn.icon,.iconbtn{padding:0;width:44px;height:40px;display:inline-flex;align-items:center;justify-content:center;
    font-size:19px;border-radius:11px;border:1px solid var(--line);background:var(--chip);color:var(--txt);cursor:pointer;}
  .iconbtn:active,.btn.icon:active{transform:scale(.94);}

  .toolstrip{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bar2);
    border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden;scrollbar-width:none;white-space:nowrap;}
  .toolstrip::-webkit-scrollbar{display:none;}
  .tool{flex:0 0 auto;border:1px solid var(--line);background:var(--chip);color:var(--txt);border-radius:10px;
    padding:9px 16px;font-size:15px;font-weight:600;cursor:pointer;}
  .tool:active{transform:scale(.95);}
  .tool.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(10,132,255,.4);}
  .toolstrip .iconbtn{flex:0 0 auto;}
  .tdiv{flex:0 0 auto;width:1px;height:26px;background:var(--line);margin:0 3px;}

  .colordot{flex:0 0 auto;width:30px;height:30px;border-radius:50%;cursor:pointer;padding:0;display:none;
    -webkit-appearance:none;appearance:none;
    border:2px solid rgba(255,255,255,.85);box-shadow:0 0 0 1px var(--line);position:relative;}
  .colordot.show{display:inline-block;}
  .colordot:active{transform:scale(.92);}
  .colorpop{position:fixed;display:none;flex-wrap:wrap;gap:11px;width:206px;padding:13px;z-index:60;
    background:var(--bar);border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 32px rgba(0,0,0,.55);}
  .colorpop.show{display:flex;}
  .colorpop .sw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;
    box-shadow:0 0 0 1px var(--line);transition:transform .12s;}
  .colorpop .sw.sel{border-color:#fff;box-shadow:0 0 0 2px rgba(0,0,0,.5);}
  .colorpop .sw:active{transform:scale(.9);}
  #stage{position:relative;flex:1;overflow:hidden;background:#202227;touch-action:none;}
  #canvas{position:absolute;left:0;top:0;}
  #empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;color:var(--muted);text-align:center;padding:28px;}
  #empty svg{opacity:.4;}
  #empty p{max-width:330px;font-size:18px;line-height:1.45;margin:0;}
  #empty .btn{font-size:16px;padding:14px 30px;}
  #boot{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;
    font-size:13px;padding:7px 14px;border-radius:16px;display:none;z-index:7;}
  #boot.show{display:block;}

  .pager{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(14,15,18,.92);
    border:1px solid var(--line);border-radius:22px;padding:5px 6px;display:none;align-items:center;gap:4px;z-index:5;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
  .pager.show{display:flex;}
  .pager button{background:none;border:none;color:var(--txt);font-size:20px;padding:6px 16px;cursor:pointer;}
  .pager span{font-size:13px;color:var(--muted);min-width:60px;text-align:center;}
  .hint{position:absolute;left:50%;top:14px;transform:translateX(-50%);background:rgba(10,132,255,.94);color:#fff;
    padding:8px 16px;border-radius:18px;font-size:13px;display:none;z-index:6;box-shadow:0 4px 16px rgba(0,0,0,.35);}
  .hint.show{display:block;}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;
    z-index:50;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);}
  .modal.show{display:flex;}
  .sheet{background:var(--bar2);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;border:1px solid var(--line);
    border-radius:20px 20px 0 0;padding:8px 18px calc(20px + env(safe-area-inset-bottom));}
  @media(min-width:560px){.modal{align-items:center;}.sheet{border-radius:20px;}}
  .grip{width:38px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 14px;}
  .sheet h3{margin:2px 0 16px;font-size:20px;font-weight:700;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:7px;}
  .field textarea,.field input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);
    border-radius:11px;padding:13px;font-size:16px;font-family:inherit;}
  .field textarea{min-height:84px;resize:vertical;}
  .sev{display:flex;gap:8px;}
  .sev button{flex:1;border:2px solid var(--line);background:var(--bg);color:var(--txt);border-radius:11px;
    padding:11px 4px;font-size:13px;font-weight:700;cursor:pointer;}
  .sev button.sel{color:#0b0b0b;}
  .sev button[data-s="critical"].sel{background:var(--crit);border-color:var(--crit);}
  .sev button[data-s="major"].sel{background:var(--major);border-color:var(--major);}
  .sev button[data-s="minor"].sel{background:var(--minor);border-color:var(--minor);}
  .sev button[data-s="observation"].sel{background:var(--obs);border-color:var(--obs);color:#fff;}
  .photos{display:flex;flex-wrap:wrap;gap:8px;}
  .photos img{width:74px;height:74px;object-fit:cover;border-radius:10px;border:1px solid var(--line);}
  .photos .add{width:74px;height:74px;border:1px dashed var(--line);border-radius:10px;display:flex;align-items:center;
    justify-content:center;font-size:26px;color:var(--muted);cursor:pointer;background:var(--bg);
    appearance:none;-webkit-appearance:none;font-family:inherit;line-height:1;padding:0;}
  .photos .add:active{transform:scale(.95);}
  .sheet-actions{display:flex;gap:10px;margin-top:12px;}
  .sheet-actions .btn{flex:1;justify-content:center;text-align:center;}
  .useg{display:flex;gap:8px;}
  .useg button{flex:1;border:2px solid var(--line);background:var(--bg);color:var(--txt);border-radius:11px;padding:11px 4px;font-size:14px;font-weight:700;cursor:pointer;}
  .useg button.sel{background:var(--accent);border-color:var(--accent);color:#fff;}
  .menu-row{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:transparent;border:none;
    border-bottom:1px solid var(--line);color:var(--txt);padding:15px 4px;font-size:16px;cursor:pointer;}
  .menu-row:active{background:rgba(255,255,255,.04);}
  .menu-row .mi{width:24px;text-align:center;font-size:18px;color:var(--accent);flex:none;}
  .menu-row .mt{flex:1;}
  .menu-row .mt small{display:block;font-size:12px;color:var(--muted);font-weight:400;margin-top:1px;}
  .menu-row.danger .mi,.menu-row.danger .mt{color:var(--danger);}
  .list-item{display:flex;gap:12px;align-items:center;padding:13px;border:1px solid var(--line);border-radius:12px;
    margin-bottom:10px;cursor:pointer;background:var(--chip);}
  .dot{width:14px;height:14px;border-radius:50%;flex:none;}
  .list-item .meta{flex:1;min-width:0;}
  .list-item .meta b{font-size:15px;}
  .list-item .meta div{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty-note{color:var(--muted);text-align:center;padding:24px;}
  .toast{position:fixed;left:50%;bottom:46px;transform:translateX(-50%);background:#000;color:#fff;padding:11px 18px;
    border-radius:20px;font-size:14px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;max-width:80%;
    text-align:center;border:1px solid #2b2b2b;}
  .toast.show{opacity:.96;}
</style>
</head>
<body>
<div id="app">
  <header class="appbar">
    <div class="brand">
      <div class="title-row">
        <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="2" stroke-linejoin="round"><path d="M12 2l8.5 5v10L12 22 3.5 17V7z"/><path d="M12 7.5v5.5" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1.15" fill="#0a84ff" stroke="none"/></svg>
        <span class="brandname">Site Inspection</span>
      </div>
      <div class="subtitle" id="meta">No drawing loaded</div>
    </div>
    <div class="appbar-actions">
      <button class="btn primary" onclick="pickFile()">Load</button>
      <button class="btn ghost" onclick="openMore()">More</button>
    </div>
  </header>
  <div class="toolstrip" id="toolbar">
    <button class="tool" data-tool="pin">Pin</button>
    <button class="tool" data-tool="area">Area</button>
    <button class="tool" data-tool="cloud">Cloud</button>
    <button class="tool" data-tool="freehand">Freehand</button>
    <button class="tool" data-tool="highlight">Highlight</button>
    <button class="tool" data-tool="arrow">Arrow</button>
    <button class="tool" data-tool="text">Text</button>
    <button class="tool" data-tool="measure">Measure</button>
    <button class="tool" data-tool="move">Move</button>
    <button class="tool active" data-tool="pan">Pan</button>
    <button class="colordot" id="colorDot" onclick="toggleColorPop(event)" title="Markup colour"></button>
    <span class="tdiv"></span>
    <button class="iconbtn" style="width:auto;padding:0 14px;font-size:14px;font-weight:600;" onclick="rotatePage()" title="Rotate page 90 degrees">Rotate</button>
    <button class="iconbtn" onclick="undo()" title="Undo">&#8630;</button>
    <button class="iconbtn" onclick="redo()" title="Redo">&#8631;</button>
  </div>
  <div id="stage">
    <canvas id="canvas"></canvas>
    <div id="colorPop" class="colorpop"></div>
    <div id="boot"></div>
    <div id="empty">
      <svg width="80" height="64" viewBox="0 0 24 18" fill="none" stroke="#8e8e93" stroke-width="1.6" stroke-linecap="round">
        <line x1="3" y1="2" x2="21" y2="2"/><line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/><line x1="3" y1="14" x2="14" y2="14"/>
      </svg>
      <p>Load a PDF drawing or photo to start your inspection. Multi-page PDFs are supported.</p>
      <button class="btn" onclick="pickFile()">Browse file</button>
    </div>
    <div class="hint" id="hint"></div>
    <div class="pager" id="pager">
      <button onclick="prevPage()" aria-label="Previous page">&#8249;</button>
      <span id="pageLabel">1 / 1</span>
      <button onclick="nextPage()" aria-label="Next page">&#8250;</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="application/pdf,image/*" style="position:fixed;left:-9999px;width:1px;height:1px;opacity:0;">
<input type="file" id="projectInput" accept=".json,application/json" style="position:fixed;left:-9999px;width:1px;height:1px;opacity:0;">

<div class="modal" id="pinModal">
  <div class="sheet">
    <h3 id="pinTitle">Finding</h3>
    <div class="field"><label>Severity</label>
      <div class="sev" id="sevPicker">
        <button data-s="critical">Critical</button>
        <button data-s="major">Major</button>
        <button data-s="minor">Minor</button>
        <button data-s="observation">Observation</button>
      </div></div>
    <div class="field"><label>Note / defect description</label>
      <textarea id="pinNote" placeholder="e.g. Sprinkler head obstructed by ductwork (AS 2118.1)"></textarea></div>
    <div class="field"><label>Location reference</label>
      <input id="pinLoc" placeholder="e.g. Level 2, Grid C-4"></div>
    <div class="field"><label>Photos</label><div class="photos" id="photoList"></div></div>
    <div class="sheet-actions">
      <button class="btn danger" onclick="deleteCurrent()">Delete</button>
      <button class="btn primary" onclick="savePin()">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="listModal">
  <div class="sheet"><h3>Findings</h3><div id="listBody"></div>
    <div class="sheet-actions"><button class="btn" onclick="closeModal('listModal')">Close</button></div></div>
</div>

<div class="modal" id="reportModal">
  <div class="sheet"><h3>Inspection Summary</h3>
    <div id="reportBody" style="font-size:15px; line-height:1.5;"></div>
    <div class="sheet-actions">
      <button class="btn" onclick="closeModal('reportModal')">Close</button>
      <button class="btn primary" onclick="closeModal('reportModal');exportPDF()">Export PDF</button>
    </div></div>
</div>

<div class="modal" id="photoModal">
  <div class="sheet" style="max-width:780px;">
    <h3>Photo markup</h3>
    <div class="row" style="padding:0 0 10px; gap:8px;">
      <button class="tool pe active" data-petool="freehand">Pen</button>
      <button class="tool pe" data-petool="highlight">Hi-lite</button>
      <button class="tool pe" data-petool="arrow">Arrow</button>
      <button class="tool pe" data-petool="area">Box</button>
      <button class="tool pe" data-petool="text">Text</button>
      <button class="btn icon" onclick="peUndo()">&#8634;</button>
    </div>
    <div id="peColors" style="display:flex; gap:8px; margin-bottom:10px;"></div>
    <div id="peWrap" style="width:100%; background:#000; border-radius:10px; overflow:hidden;">
      <canvas id="peCanvas" style="display:block; width:100%; touch-action:none;"></canvas>
    </div>
    <div class="sheet-actions">
      <button class="btn danger" onclick="peDelete()">Delete photo</button>
      <button class="btn primary" onclick="peDone()">Done</button>
    </div>
  </div>
</div>

<div class="modal" id="moreModal">
  <div class="sheet">
    <div class="grip"></div>
    <h3>Actions</h3>
    <button class="menu-row" onclick="closeModal('moreModal');saveProject()"><span class="mi">&#8595;</span><span class="mt">Save project<small>Save your work to continue later</small></span></button>
    <button class="menu-row" onclick="closeModal('moreModal');openProject()"><span class="mi">&#8593;</span><span class="mt">Open project<small>Resume a saved inspection</small></span></button>
    <button class="menu-row" onclick="closeModal('moreModal');openList()"><span class="mi">&#9776;</span><span class="mt">Findings list<small>Review and jump to pins</small></span></button>
    <button class="menu-row" onclick="closeModal('moreModal');showReport()"><span class="mi">&#9636;</span><span class="mt">Report summary</span></button>
    <button class="menu-row" onclick="closeModal('moreModal');exportPDF()"><span class="mi">&#9112;</span><span class="mt">Export PDF report</span></button>
    <button class="menu-row" onclick="closeModal('moreModal');exportAnnotated()"><span class="mi">&#9974;</span><span class="mt">Export annotated image</span></button>
    <button class="menu-row" onclick="closeModal('moreModal');openScale()"><span class="mi">&#8596;</span><span class="mt">Set drawing scale<small>Type a ratio (1:100) or calibrate by line</small></span></button>
    <button class="menu-row danger" onclick="closeModal('moreModal');clearAll()"><span class="mi">&#10005;</span><span class="mt">Clear this page</span></button>
    <div class="sheet-actions"><button class="btn ghost" onclick="closeModal('moreModal')">Cancel</button></div>
  </div>
</div>

<div class="modal" id="scaleModal">
  <div class="sheet">
    <div class="grip"></div>
    <h3>Drawing scale</h3>
    <div id="scaleCurrent" style="font-size:13px;color:var(--muted);margin:-6px 0 14px;"></div>
    <div class="field"><label>Real-world units</label>
      <div class="useg" id="scaleUnits">
        <button type="button" data-u="mm">mm</button><button type="button" data-u="cm">cm</button>
        <button type="button" data-u="m">m</button><button type="button" data-u="ft">ft</button><button type="button" data-u="in">in</button>
      </div></div>
    <div class="field"><label>Scale ratio &nbsp; 1 :</label>
      <input id="scaleRatio" inputmode="decimal" placeholder="e.g. 100 for 1:100 (PDF only)"></div>
    <div class="sheet-actions" style="flex-wrap:wrap;">
      <button class="btn primary" style="flex:1 1 100%;" onclick="applyRatio()">Apply ratio</button>
      <button class="btn" onclick="startCalibrate()">Calibrate by line</button>
      <button class="btn danger" onclick="clearScale()">Clear</button>
      <button class="btn ghost" onclick="closeModal('scaleModal')">Close</button>
    </div>
  </div>
</div>

<div class="modal" id="askModal">
  <div class="sheet">
    <div class="grip"></div>
    <h3 id="askTitle">Enter value</h3>
    <div class="field" id="askField"><input id="askInput" type="text"></div>
    <div class="sheet-actions">
      <button class="btn ghost" id="askCancel">Cancel</button>
      <button class="btn primary" id="askOk">OK</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Libraries loaded from CDN (online build, e.g. Netlify).
     PDF.js 3.11.174 is the last classic (non-module) build, so it works on iOS Safari
     with plain script-src tags and no ESM/import. pdf-lib 1.17.1 is the standard UMD build.
     For offline/field use, keep the separate ~3 MB embedded-libraries version of this file. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js" crossorigin="anonymous"></script>
<script>
/* Wire the CDN globals to the names the rest of the app already expects.
   PDF.js UMD exposes window.pdfjsLib; the app reads window.__pdfjs.
   pdf-lib UMD already exposes window.PDFLib, so it needs no remapping. */
(function () {
  if (window.pdfjsLib) {
    window.__pdfjs = window.pdfjsLib;
    try {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    } catch (e) {}
  }
})();
</script>

<script>
/* ---------- Libraries (classic scripts, loaded above this one) ---------- */
let pdfjsLib=null, PDFLib=null;
function initLibs(){
  pdfjsLib = window.__pdfjs || null;
  PDFLib = window.PDFLib || null;
  const ok = !!(pdfjsLib && PDFLib);
  if(!ok){ const b=document.getElementById('boot'); if(b){b.textContent='PDF engine failed to load'; b.classList.add('show');} }
  return ok;
}
const libsReady = Promise.resolve(initLibs());
function openMore(){document.getElementById('moreModal').classList.add('show');}
const MM_PER={mm:1,cm:10,m:1000,ft:304.8,in:25.4};
let scaleUnit='mm', recalibrate=false;
function setScaleUnit(u){scaleUnit=u;document.querySelectorAll('#scaleUnits button').forEach(b=>b.classList.toggle('sel',b.dataset.u===u));}
function chooseScaleUnit(u){const p=page();
  if(p&&p.cal&&p.cal.unit&&p.cal.unit!==u){ p.cal.ppu=p.cal.ppu*MM_PER[u]/MM_PER[p.cal.unit]; p.cal.unit=u; render(); updateScaleCurrent(); }
  setScaleUnit(u);}
document.querySelectorAll('#scaleUnits button').forEach(b=>b.onclick=()=>chooseScaleUnit(b.dataset.u));
function updateScaleCurrent(){const cal=page()&&page().cal;
  document.getElementById('scaleCurrent').textContent = cal
    ? ('Current: measuring in '+cal.unit+(cal.ratio?(' (1:'+cal.ratio+')'):'')+' \u00b7 tap a unit above to convert')
    : (page()&&page().pxPerPt?'No scale set. Type a ratio, or calibrate by line.':'No scale set. This is an image \u2014 use Calibrate by line.');}
function openScale(){
  if(!page()){toast('Load a drawing first');return;}
  const cal=page().cal;
  setScaleUnit(cal&&cal.unit?cal.unit:scaleUnit);
  document.getElementById('scaleRatio').value=(cal&&cal.ratio)?cal.ratio:'';
  updateScaleCurrent();
  document.getElementById('scaleModal').classList.add('show');
}
function applyRatio(){
  const p=page(); if(!p)return;
  if(!p.pxPerPt){toast('Ratio needs a PDF. Use Calibrate by line for images.');return;}
  const R=parseFloat(document.getElementById('scaleRatio').value);
  if(!(R>0)){toast('Enter a ratio, e.g. 100 for 1:100');return;}
  const ppuMm = p.pxPerPt*(72/25.4)/R;          // px per real mm
  const ppu = ppuMm*MM_PER[scaleUnit];           // px per chosen unit
  p.cal={ppu,unit:scaleUnit,ratio:R};
  closeModal('scaleModal'); render(); toast('Scale set: 1:'+R+' \u00b7 '+scaleUnit);
}
function startCalibrate(){
  if(!page())return; recalibrate=true; setTool('measure'); closeModal('scaleModal');
  showHint('Draw a line over a known length to calibrate');
}
function clearScale(){if(page()){page().cal=null;render();}closeModal('scaleModal');toast('Scale cleared');}
/* In-app prompt/confirm (browser prompt()/confirm() are blocked in some webviews) */
let _askCb=null;
function askText(title,def,cb,opts){opts=opts||{};
  document.getElementById('askTitle').textContent=title;
  const field=document.getElementById('askField'),inp=document.getElementById('askInput');
  field.style.display=opts.hideInput?'none':'';

/* ---------- File loading ---------- */
function pickFile(){document.getElementById('fileInput').click();}
let photoTargetPin=null;
document.getElementById('fileInput').addEventListener('change', async e=>{
  const f=e.target.files[0]; e.target.value=''; if(!f) return;
  if(photoTargetPin){ photoTargetPin=null; processPhotoFiles([f]); return; }
  try{
    if(f.type==='application/pdf'||/\.pdf$/i.test(f.name)) await loadPDF(f);
    else await loadImage(f);
  }catch(err){console.error(err);toast('Could not load file');}
});
async function loadPDF(file){
  toast('Opening PDF…'); const ok=await libsReady;
  if(!ok||!pdfjsLib){toast('PDF engine unavailable');return;}
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i); let vp=pg.getViewport({scale:1});
    // Rasterize at higher resolution for sharper text/linework. Capped to stay within
    // mobile (iOS Safari) canvas limits: max 3500px per side and a total pixel-area budget.
    const MAXW=3500, MAXS=4, MAXA=(pdf.numPages>6?8.0e6:11.0e6);
    let s=Math.min(MAXS, MAXW/vp.width, MAXW/vp.height);
    if(vp.width*vp.height*s*s>MAXA) s*=Math.sqrt(MAXA/(vp.width*vp.height*s*s));
    vp=pg.getViewport({scale:s});
    const c=document.createElement('canvas'); c.width=Math.round(vp.width); c.height=Math.round(vp.height);
    await pg.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
    pages.push({bitmap:c,w:c.width,h:c.height,annots:[],pxPerPt:s});
  }
  setPages(pages,file.name);
}
function loadImage(file){

    img.onload=()=>{ try{
        const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
        const max=2600,s=Math.min(1,max/Math.max(iw,ih));
        const c=document.createElement('canvas'); c.width=Math.round(iw*s); c.height=Math.round(ih*s);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        setPages([{bitmap:c,w:c.width,h:c.height,annots:[]}],file.name);
      }catch(err){console.error(err);toast('Could not process image');} URL.revokeObjectURL(url); res(); };
    img.onerror=()=>{URL.revokeObjectURL(url);toast('Couldn\u2019t open this image (HEIC may need Most Compatible)');rej();};
    img.src=url;

}

/* ---------- Gestures ---------- */
let pointers=new Map(),startDist=0,startScale=1,startMid=null,startPan=null,down=null,movingAnnot=null,drewSomething=false;

  down={sx,sy,w:toWorld(sx,sy)}; drewSomething=false; const t=state.tool;

  else if(t==='area'||t==='cloud')state.draft={type:t,severity:'major',color:state.color,x:down.w.x,y:down.w.y,w:0,h:0};
  else if(t==='arrow')state.draft={type:'arrow',severity:'major',color:state.color,x1:down.w.x,y1:down.w.y,x2:down.w.x,y2:down.w.y};
  else if(t==='measure')state.draft={type:'measure',x1:down.w.x,y1:down.w.y,x2:down.w.x,y2:down.w.y};
  else if(t==='freehand'||t==='highlight')state.draft={type:t,severity:'major',color:state.color,points:[{x:down.w.x,y:down.w.y}]};

stage.addEventListener('pointermove',e=>{

  else if(t==='move'&&movingAnnot){moveAnnot(movingAnnot,w);render();}
  else if((t==='area'||t==='cloud')&&state.draft){state.draft.w=w.x-state.draft.x;state.draft.h=w.y-state.draft.y;render();}
  else if(t==='arrow'&&state.draft){state.draft.x2=w.x;state.draft.y2=w.y;render();}
  else if(t==='measure'&&state.draft){state.draft.x2=w.x;state.draft.y2=w.y;render();}

});

  else if(t==='text'&&!drewSomething){placeText(down.w);}
  else if(t==='move'&&movingAnnot&&!drewSomething){movingAnnot.type==='text'?editText(movingAnnot):openPin(movingAnnot);}
  else if(t==='pan'&&!drewSomething){const h=hitTest(down.w);if(h&&h.type==='pin')openPin(h);}

    else if(t==='freehand'||t==='highlight'){if(state.draft.points.length>2)commitDraft();}
    else if(t==='measure'){const dr=state.draft,d=dist(dr.x1,dr.y1,dr.x2,dr.y2);state.draft=null;
      if(d>6){ if(!page().cal || recalibrate){ recalibrate=false; render();
          askText('Real length of this line ('+scaleUnit+')','',v=>{const m=v&&String(v).match(/([\d.]+)\s*([a-zA-Z]+)?/);
            if(m){const n=parseFloat(m[1]),unit=(m[2]||scaleUnit);if(n>0){scaleUnit=unit;page().cal={ppu:d/n,unit:unit};pushHistory();dr.id=seq++;page().annots.push(dr);render();toast('Scale set \u00b7 measuring in '+unit);}}},
            {placeholder:'e.g. 5000 '+scaleUnit,inputMode:'decimal'});

function editText(a){askText('Edit label',a.text||'',s=>{if(s===null)return;pushHistory();a.text=s;render();});}
function openPin(a){

  document.getElementById('pinTitle').textContent=a.type==='pin'?('Finding #'+(a.num||'')):(a.type[0].toUpperCase()+a.type.slice(1)+' markup');

function renderPhotos(){const box=document.getElementById('photoList');box.innerHTML='';
  (state.editing.photos||[]).forEach((p,i)=>{const im=new Image();im.style.cursor='pointer';
    flattenPhoto(p,220).then(c=>im.src=c.toDataURL('image/jpeg',0.8)).catch(()=>{im.src=normPhoto(p).src;});
    im.onclick=()=>openPhotoEditor(i);box.appendChild(im);});
  const add=document.createElement('button');add.type='button';add.className='add';add.textContent='+';add.title='Add photo (camera, library or files)';add.onclick=addPhoto;box.appendChild(add);}
let pendingPhotoPin=null;
function addPhoto(){
  pendingPhotoPin = state.editing || pendingPhotoPin;
  photoTargetPin = pendingPhotoPin;
  // Use the SAME input that works for "Load", from the bare screen, and route the result to this pin
  closeModal('pinModal');
  toast('Choose a photo\u2026');
  document.getElementById('fileInput').click();
}
function processPhotoFiles(files){
  const target=state.editing||pendingPhotoPin; if(!files||!files.length||!target)return;
  toast(files.length>1?('Adding '+files.length+' photos\u2026'):'Adding photo\u2026');
  let pending=files.length, added=0;
  const done=()=>{if(--pending===0){
    if(state.editing===target){renderPhotos();}
    else if(target.type==='pin'){openPin(target);}
    render(); if(added)toast(added>1?(added+' photos added'):'Photo added');}};
  [...files].forEach(f=>{
    const url=URL.createObjectURL(f); const img=new Image(); let settled=false;
    const finish=ok=>{if(settled)return;settled=true;if(ok)added++;try{URL.revokeObjectURL(url);}catch(_){}done();};
    img.onload=()=>{try{
        const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
        const max=1600,s=Math.min(1,max/Math.max(iw,ih));
        const c=document.createElement('canvas');c.width=Math.max(1,Math.round(iw*s));c.height=Math.max(1,Math.round(ih*s));
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        target.photos=target.photos||[];
        target.photos.push({src:c.toDataURL('image/jpeg',0.82),marks:[]});finish(true);
      }catch(err){console.error(err);toast('Could not process this photo');finish(false);}};
    img.onerror=()=>{toast('Could not read this photo. On iPhone try Settings, Camera, Formats, Most Compatible.');finish(false);};
    setTimeout(()=>{if(!settled){toast('Photo timed out, please try again');finish(false);}},15000);
    img.src=url;});}
function savePin(){if(!state.editing)return;state.editing.note=document.getElementById('pinNote').value;
  state.editing.loc=document.getElementById('pinLoc').value;closeModal('pinModal');render();refreshMeta();}

  document.getElementById('reportModal').classList.add('show');}

/* ---------- Composite (drawing + annotations at full res) ---------- */
function composite(p){const c=document.createElement('canvas');c.width=p.w;c.height=p.h;
  const x=c.getContext('2d');x.drawImage(p.bitmap,0,0);
  const LW=Math.max(2,c.width/500);
  p.annots.forEach(a=>{const col=a.color||SEV[a.severity||'observation'].c;x.lineWidth=LW;x.strokeStyle=col;x.fillStyle=col;x.globalAlpha=1;
    if(a.type==='area'){x.globalAlpha=.18;x.fillRect(a.x,a.y,a.w,a.h);x.globalAlpha=1;x.strokeRect(a.x,a.y,a.w,a.h);}
    else if(a.type==='cloud'){drawCloud(x,a.x,a.y,a.w,a.h,col,LW);}
    else if(a.type==='arrow'){const head=Math.max(16,c.width/80),ang=Math.atan2(a.y2-a.y1,a.x2-a.x1);
      x.beginPath();x.moveTo(a.x1,a.y1);x.lineTo(a.x2,a.y2);x.stroke();
      x.beginPath();x.moveTo(a.x2,a.y2);x.lineTo(a.x2-head*Math.cos(ang-0.4),a.y2-head*Math.sin(ang-0.4));
      x.lineTo(a.x2-head*Math.cos(ang+0.4),a.y2-head*Math.sin(ang+0.4));x.closePath();x.fill();}
    else if(a.type==='freehand'){x.beginPath();a.points.forEach((pt,i)=>i?x.lineTo(pt.x,pt.y):x.moveTo(pt.x,pt.y));x.stroke();}
    else if(a.type==='highlight'){x.save();x.globalAlpha=.35;x.lineWidth=Math.max(12,c.width/110);x.lineCap='round';x.lineJoin='round';x.beginPath();a.points.forEach((pt,i)=>i?x.lineTo(pt.x,pt.y):x.moveTo(pt.x,pt.y));x.stroke();x.restore();}
    else if(a.type==='text'){drawTextAnnot(x,a,LW);}
    else if(a.type==='measure'){drawMeasure(x,a,LW,p.cal,Math.max(16,c.width/60));}
    else if(a.type==='pin'){const r=Math.max(14,c.width/90);x.beginPath();x.arc(a.x,a.y-r*1.6,r,0,Math.PI*2);x.fillStyle=col;x.fill();
      x.lineWidth=Math.max(2,r/7);x.strokeStyle='#fff';x.stroke();x.fillStyle='#fff';x.font=`bold ${Math.round(r*1.1)}px sans-serif`;x.textAlign='center';x.textBaseline='middle';
      x.fillText(String(a.num||''),a.x,a.y-r*1.6);}});
  return c;}
function exportAnnotated(){if(!page()){toast('Load a drawing first');return;}
  composite(page()).toBlob(b=>download(URL.createObjectURL(b),(state.docName||'drawing').replace(/\.[^.]+$/,'')+'_annotated.png'),'image/png');}
function download(url,name){const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();}
function hex(h){const n=parseInt(h.slice(1),16);return [(n>>16)&255,(n>>8)&255,n&255];}

/* ---------- PDF export (pdf-lib, offline) ---------- */
function san(s){return String(s||'').replace(/[^\x09\x0A\x0D\x20-\xFF]/g,'?');}
function wrap(text,font,size,maxW){const words=san(text).split(/\s+/);const lines=[];let line='';
  for(const w of words){const t=line?line+' '+w:w;
    if(font.widthOfTextAtSize(t,size)>maxW&&line){lines.push(line);line=w;}else line=t;}
  if(line)lines.push(line);return lines.length?lines:[''];}
async function exportPDF(){
  if(!page()){toast('Load a drawing first');return;}
  toast('Building PDF…'); const ok=await libsReady; if(!ok||!PDFLib){toast('PDF engine unavailable');return;}
  try{
    const {PDFDocument,StandardFonts,rgb}=PDFLib;
    const doc=await PDFDocument.create();
    const font=await doc.embedFont(StandardFonts.Helvetica);
    const bold=await doc.embedFont(StandardFonts.HelveticaBold);
    const A4=[595.28,841.89],M=40;
    const C=s=>{const[r,g,b]=hex(SEV[s].c);return rgb(r/255,g/255,b/255);};
    const embed=async d=>{const b=Uint8Array.from(atob(d.split(',')[1]),c=>c.charCodeAt(0));
      return /^data:image\/png/i.test(d)?doc.embedPng(b):doc.embedJpg(b);};

    let pg=doc.addPage(A4),{width:W,height:H}=pg.getSize();
    pg.drawText('Site Inspection Report',{x:M,y:H-70,size:22,font:bold});
    pg.drawText(san(state.docName),{x:M,y:H-100,size:12,font,color:rgb(.3,.3,.3)});
    pg.drawText(new Date().toLocaleString(),{x:M,y:H-118,size:11,font,color:rgb(.3,.3,.3)});
    const f=allFindings(),counts={critical:0,major:0,minor:0,observation:0};f.forEach(x=>counts[x.a.severity]++);
    pg.drawText('Summary',{x:M,y:H-158,size:14,font:bold});let y=H-182;
    for(const k of ['critical','major','minor','observation']){pg.drawCircle({x:M+5,y:y+3,size:4,color:C(k)});
      pg.drawText(`${SEV[k].label}: ${counts[k]}`,{x:M+16,y,size:11,font});y-=18;}

    for(let pi=0;pi<state.pages.length;pi++){const p=state.pages[pi];
      const img=await embed(composite(p).toDataURL('image/png'));
      if(p.pxPerPt){ // keep the original PDF page size; drawing fills the sheet
        const wpt=p.w/p.pxPerPt, hpt=p.h/p.pxPerPt;
        pg=doc.addPage([wpt,hpt]);
        pg.drawImage(img,{x:0,y:0,width:wpt,height:hpt});
      } else { // uploaded image has no fixed sheet size -> fit on A4
        pg=doc.addPage(A4);({width:W,height:H}=pg.getSize());
        const ratio=Math.min((W-2*M)/p.w,(H-2*M)/p.h),iw=p.w*ratio,ih=p.h*ratio;
        pg.drawImage(img,{x:(W-iw)/2,y:(H-ih)/2,width:iw,height:ih});
      }}

    if(f.length){ // consolidated findings register (A4)
      pg=doc.addPage(A4);({width:W,height:H}=pg.getSize());
      pg.drawText('Findings',{x:M,y:H-50,size:16,font:bold});let yy=H-80;
      for(const x of f){
        if(yy<70){pg=doc.addPage(A4);({width:W,height:H}=pg.getSize());yy=H-50;}
        pg.drawCircle({x:M+4,y:yy+3,size:4,color:C(x.a.severity)});
        const head=`#${x.a.num} ${SEV[x.a.severity].label}`+(state.pages.length>1?` (drawing ${x.pi+1})`:'')+(x.a.loc?' - '+x.a.loc:'');
        pg.drawText(san(head),{x:M+14,y:yy,size:11,font:bold});yy-=15;
        for(const ln of wrap(x.a.note||'(no description)',font,10,W-2*M-14)){if(yy<60){pg=doc.addPage(A4);({width:W,height:H}=pg.getSize());yy=H-50;}
          pg.drawText(ln,{x:M+14,y:yy,size:10,font,color:rgb(.27,.27,.27)});yy-=13;}
        yy-=12;}}

    const wp=f.filter(x=>x.a.photos&&x.a.photos.length);
    for(const sev of ['critical','major','minor','observation']){const grp=wp.filter(x=>x.a.severity===sev);if(!grp.length)continue;
      pg=doc.addPage(A4);({width:W,height:H}=pg.getSize());
      pg.drawText(`Photo Appendix - ${SEV[sev].label}`,{x:M,y:H-45,size:14,font:bold});let yy=H-72;
      for(const x of grp)for(const ph of x.a.photos){const c=await flattenPhoto(ph,1600);const img=await embed(c.toDataURL('image/jpeg',0.85)),d=img.scale(1);
        const pw=W-2*M,phh=pw*(d.height/d.width);
        if(yy-phh<40){pg=doc.addPage(A4);yy=H-50;}
        pg.drawText(san(`#${x.a.num} ${(x.a.note||'').slice(0,80)}`),{x:M,y:yy,size:10,font,color:rgb(.25,.25,.25)});yy-=14;
        pg.drawImage(img,{x:M,y:yy-phh,width:pw,height:phh});yy-=phh+22;}}

    const bytes=await doc.save();
    download(URL.createObjectURL(new Blob([bytes],{type:'application/pdf'})),(state.docName||'inspection').replace(/\.[^.]+$/,'')+'_report.pdf');
    toast('PDF ready');
  }catch(e){console.error(e);toast('PDF export failed');}
}

/* ---------- Rotate current page 90° CW (annotations follow) ---------- */
function rotatePage(){const p=page();if(!p)return;pushHistory();
  const W=p.w,H=p.h,nc=document.createElement('canvas');nc.width=H;nc.height=W;
  const nx=nc.getContext('2d');nx.translate(H,0);nx.rotate(Math.PI/2);nx.drawImage(p.bitmap,0,0);
  const map=(x,y)=>({x:H-y,y:x});
  p.annots.forEach(a=>{
    if(a.type==='pin'||a.type==='text'){const m=map(a.x,a.y);a.x=m.x;a.y=m.y;}
    else if(a.type==='area'||a.type==='cloud'){const nX=H-a.y-a.h,nY=a.x,nW=a.h,nH=a.w;a.x=nX;a.y=nY;a.w=nW;a.h=nH;}
    else if(a.type==='arrow'){const m1=map(a.x1,a.y1),m2=map(a.x2,a.y2);a.x1=m1.x;a.y1=m1.y;a.x2=m2.x;a.y2=m2.y;}
    else if(a.type==='measure'){const m1=map(a.x1,a.y1),m2=map(a.x2,a.y2);a.x1=m1.x;a.y1=m1.y;a.x2=m2.x;a.y2=m2.y;}
    else if(a.type==='freehand'||a.type==='highlight'){a.points=a.points.map(pt=>map(pt.x,pt.y));}});
  p.bitmap=nc;p.w=H;p.h=W;fitPage();refreshMeta();}

/* ---------- Photo helpers + markup ---------- */
function normPhoto(p){return typeof p==='string'?{src:p,marks:[]}:{src:p.src,marks:p.marks||[]};}
function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
async function flattenPhoto(p,maxDim){const ph=normPhoto(p);const img=await loadImg(ph.src);
  const sc=maxDim?Math.min(1,maxDim/Math.max(img.width,img.height)):1;
  const c=document.createElement('canvas');c.width=Math.max(1,Math.round(img.width*sc));c.height=Math.max(1,Math.round(img.height*sc));
  const x=c.getContext('2d');x.drawImage(img,0,0,c.width,c.height);ph.marks.forEach(m=>drawMark(x,m,sc));return c;}
function drawMark(x,m,sc){x.lineWidth=Math.max(1,(m.w||3)*sc);x.strokeStyle=m.color||'#ff453a';x.fillStyle=m.color||'#ff453a';x.lineCap='round';x.lineJoin='round';x.globalAlpha=1;
  if(m.type==='freehand'){x.beginPath();m.points.forEach((p,i)=>i?x.lineTo(p.x*sc,p.y*sc):x.moveTo(p.x*sc,p.y*sc));x.stroke();}
  else if(m.type==='highlight'){x.save();x.globalAlpha=.35;x.lineWidth=Math.max(8,(m.w||3)*sc*4);x.beginPath();m.points.forEach((p,i)=>i?x.lineTo(p.x*sc,p.y*sc):x.moveTo(p.x*sc,p.y*sc));x.stroke();x.restore();}
  else if(m.type==='arrow'){const x1=m.x1*sc,y1=m.y1*sc,x2=m.x2*sc,y2=m.y2*sc,head=Math.max(8,(m.w||3)*sc*5),ang=Math.atan2(y2-y1,x2-x1);
    x.beginPath();x.moveTo(x1,y1);x.lineTo(x2,y2);x.stroke();
    x.beginPath();x.moveTo(x2,y2);x.lineTo(x2-head*Math.cos(ang-0.4),y2-head*Math.sin(ang-0.4));
    x.lineTo(x2-head*Math.cos(ang+0.4),y2-head*Math.sin(ang+0.4));x.closePath();x.fill();}
  else if(m.type==='area'){x.globalAlpha=.18;x.fillRect(m.x*sc,m.y*sc,m.rw*sc,m.rh*sc);x.globalAlpha=1;x.strokeRect(m.x*sc,m.y*sc,m.rw*sc,m.rh*sc);}
  else if(m.type==='text'){const fs=(m.fs||40)*sc;x.font=`bold ${fs}px -apple-system,sans-serif`;x.textAlign='left';x.textBaseline='alphabetic';
    const tw=x.measureText(m.text||'').width,pad=fs*0.25;x.globalAlpha=1;x.fillStyle='rgba(255,255,255,0.8)';x.fillRect(m.x*sc-pad,m.y*sc-fs,tw+2*pad,fs+pad);
    x.fillStyle=m.color||'#ff453a';x.fillText(m.text||'',m.x*sc,m.y*sc-fs*0.25);}}

const PE={idx:-1,img:null,ref:null,tool:'freehand',color:'#ff453a',draft:null,dispW:0,dispH:0,sc:1};
function openPhotoEditor(i){
  const tgt=state.editing||pendingPhotoPin; if(!tgt||!tgt.photos||!tgt.photos[i])return;
  if(typeof tgt.photos[i]==='string') tgt.photos[i]={src:tgt.photos[i],marks:[]};
  PE.idx=i; PE.ref=tgt.photos[i]; PE.ref.marks=PE.ref.marks||[]; PE.draft=null; PE.img=null; PE.pin=tgt;
  document.getElementById('pinModal').classList.remove('show'); // give the editor full focus
  document.getElementById('photoModal').classList.add('show');setPEtool('freehand');renderPEColors();
  const img=new Image();
  img.onload=()=>{PE.img=img;layoutPE();drawPE();};
  img.onerror=()=>{toast('Could not open this photo to edit');};
  img.src=PE.ref.src;
  requestAnimationFrame(()=>{if(PE.img){layoutPE();drawPE();}});
}
function layoutPE(){if(!PE.img)return;const wrap=document.getElementById('peWrap'),cnv=document.getElementById('peCanvas'),dpr=window.devicePixelRatio||1;
  const dispW=wrap.clientWidth,dispH=dispW*PE.img.height/PE.img.width;
  PE.dispW=dispW;PE.dispH=dispH;PE.sc=dispW/PE.img.width;
  cnv.style.height=dispH+'px';cnv.width=dispW*dpr;cnv.height=dispH*dpr;cnv.getContext('2d').setTransform(dpr,0,0,dpr,0,0);}
function drawPE(){if(!PE.img)return;const x=document.getElementById('peCanvas').getContext('2d');
  x.clearRect(0,0,PE.dispW,PE.dispH);x.drawImage(PE.img,0,0,PE.dispW,PE.dispH);
  PE.ref.marks.concat(PE.draft?[PE.draft]:[]).forEach(m=>drawMark(x,m,PE.sc));}
function pePoint(e){const r=document.getElementById('peCanvas').getBoundingClientRect();return {x:(e.clientX-r.left)/PE.sc,y:(e.clientY-r.top)/PE.sc};}
function setPEtool(t){PE.tool=t;document.querySelectorAll('.pe').forEach(b=>b.classList.toggle('active',b.dataset.petool===t));}
function renderColorUI(){
  const dot=document.getElementById('colorDot'); if(dot)dot.style.background=state.color;
  const box=document.getElementById('colorPop'); if(!box)return; box.innerHTML='';
  PALETTE.forEach(c=>{const d=document.createElement('div');d.className='sw'+(c===state.color?' sel':'');
    d.style.background=c;d.onclick=ev=>{ev.stopPropagation();state.color=c;renderColorUI();closeColorPop();};box.appendChild(d);});}
function toggleColorPop(ev){if(ev)ev.stopPropagation();
  const box=document.getElementById('colorPop'),dot=document.getElementById('colorDot');
  if(box.classList.contains('show')){closeColorPop();return;}
  renderColorUI();box.classList.add('show');
  const r=dot.getBoundingClientRect(),pw=box.offsetWidth||206,ph=box.offsetHeight||0;
  let left=Math.min(Math.max(8,r.left+r.width/2-pw/2),innerWidth-pw-8);
  let top=r.bottom+8; if(top+ph>innerHeight-8)top=Math.max(8,r.top-ph-8);
  box.style.left=left+'px';box.style.top=top+'px';}
function closeColorPop(){const box=document.getElementById('colorPop');if(box)box.classList.remove('show');}
document.addEventListener('pointerdown',e=>{const box=document.getElementById('colorPop');
  if(box&&box.classList.contains('show')&&!box.contains(e.target)&&e.target.id!=='colorDot')closeColorPop();},true);
function renderPEColors(){const box=document.getElementById('peColors');box.innerHTML='';
  const palette=PALETTE;
  palette.forEach(c=>{const d=document.createElement('div');
    d.style.cssText=`width:36px;height:36px;border-radius:50%;background:${c};border:3px solid ${c===PE.color?'#fff':'transparent'};cursor:pointer;box-shadow:${c===PE.color?'0 0 0 2px rgba(0,0,0,.3)':'none'};transition:all .15s;`;
    d.onmouseover=()=>{d.style.transform='scale(1.1)';};
    d.onmouseout=()=>{d.style.transform='scale(1)';};
    d.onclick=()=>{PE.color=c;renderPEColors();drawPE();};
    box.appendChild(d);});}
function peUndo(){if(PE.ref&&PE.ref.marks.length){PE.ref.marks.pop();drawPE();}}
function peDelete(){askConfirm('Remove this photo?',ok=>{if(ok){(state.editing||pendingPhotoPin).photos.splice(PE.idx,1);closeModal('photoModal');if(PE.pin)openPin(PE.pin);else renderPhotos();render();}});}
function peDone(){closeModal('photoModal');if(PE.pin)openPin(PE.pin);else renderPhotos();}
(function(){const cnv=document.getElementById('peCanvas');
  cnv.addEventListener('pointerdown',e=>{if(!PE.img)return;e.preventDefault();cnv.setPointerCapture(e.pointerId);
    const p=pePoint(e),w=Math.max(2,PE.img.width/300);
    if(PE.tool==='freehand'||PE.tool==='highlight')PE.draft={type:PE.tool,color:PE.color,w,points:[p]};
    else if(PE.tool==='arrow')PE.draft={type:'arrow',color:PE.color,w,x1:p.x,y1:p.y,x2:p.x,y2:p.y};
    else if(PE.tool==='area')PE.draft={type:'area',color:PE.color,w,x:p.x,y:p.y,rw:0,rh:0};
    else if(PE.tool==='text'){const px=p.x,py=p.y;askText('Label text','',s=>{if(s){PE.ref.marks.push({type:'text',color:PE.color,x:px,y:py,text:s,fs:Math.max(24,PE.img.width/22)});drawPE();}});}
    drawPE();});
  cnv.addEventListener('pointermove',e=>{if(!PE.draft)return;e.preventDefault();const p=pePoint(e);
    if(PE.draft.type==='freehand'||PE.draft.type==='highlight')PE.draft.points.push(p);
    else if(PE.draft.type==='arrow'){PE.draft.x2=p.x;PE.draft.y2=p.y;}
    else if(PE.draft.type==='area'){PE.draft.rw=p.x-PE.draft.x;PE.draft.rh=p.y-PE.draft.y;}drawPE();});
  cnv.addEventListener('pointerup',e=>{try{cnv.releasePointerCapture(e.pointerId);}catch(_){}if(!PE.draft)return;let keep=true;const d=PE.draft;
    if(d.type==='area'){if(d.rw<0){d.x+=d.rw;d.rw=-d.rw;}if(d.rh<0){d.y+=d.rh;d.rh=-d.rh;}if(d.rw<4||d.rh<4)keep=false;}
    if(d.type==='arrow'&&Math.hypot(d.x2-d.x1,d.y2-d.y1)<4)keep=false;
    if((d.type==='freehand'||d.type==='highlight')&&d.points.length<2)keep=false;
    if(keep)PE.ref.marks.push(d);PE.draft=null;drawPE();});
  document.querySelectorAll('.pe').forEach(b=>b.onclick=()=>setPEtool(b.dataset.petool));})();
window.addEventListener('resize',()=>{if(document.getElementById('photoModal').classList.contains('show')){layoutPE();drawPE();}});

/* ---------- Save / open project ---------- */
function saveProject(){if(!page()){toast('Load a drawing first');return;}toast('Saving project…');
  const data={v:1,docName:state.docName,seq,current:state.current,
    pages:state.pages.map(p=>({w:p.w,h:p.h,img:p.bitmap.toDataURL('image/jpeg',0.85),annots:p.annots,cal:p.cal||null,pxPerPt:p.pxPerPt||null}))};
  download(URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'})),(state.docName||'inspection').replace(/\.[^.]+$/,'')+'.inspection.json');}
function openProject(){document.getElementById('projectInput').click();}
document.getElementById('projectInput').addEventListener('change',async e=>{
  const f=e.target.files[0];e.target.value='';if(!f)return;
  try{const data=JSON.parse(await f.text());const pages=[];
    for(const pd of data.pages){const img=await loadImg(pd.img);
      const c=document.createElement('canvas');c.width=pd.w;c.height=pd.h;c.getContext('2d').drawImage(img,0,0,pd.w,pd.h);
      pages.push({bitmap:c,w:pd.w,h:pd.h,annots:pd.annots||[],cal:pd.cal||null,pxPerPt:pd.pxPerPt||null});}
    seq=data.seq||1;state.pages=pages;state.current=Math.min(data.current||0,pages.length-1);
    state.undo=[];state.redo=[];state.docName=data.docName||'Project';
    document.getElementById('empty').style.display='none';fitPage();refreshMeta();updatePager();toast('Project loaded');
  }catch(err){console.error(err);toast('Could not open project file');}});

/* ---------- Init ---------- */
resizeCanvas();
</script>
